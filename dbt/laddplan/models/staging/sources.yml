version: 2

sources:
  - name: raw
    description: Raw reference data loaded from LaddPlan CSV files into Postgres.
    schema: raw

    tables:
      - name: locations
        description: Network locations used as candidate charger sites.
        columns:
          - name: location_id
            tests:
              - unique
              - not_null

          - name: location_name
            tests:
              - unique
              - not_null

          - name: x_coordinate
            tests:
              - not_null

          - name: y_coordinate
            tests:
              - not_null

      - name: roads
        description: Road connections between locations with manually defined distance.
        columns:
          - name: road_id
            tests:
              - unique
              - not_null

          - name: start_location
            tests:
              - not_null

          - name: end_location
            tests:
              - not_null

          - name: distance_km
            tests:
              - not_null